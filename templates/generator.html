<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel ECharts 代码生成器</title>
<style>
/* ═══════════════════════════════════════════
   APPLE-INSPIRED DESIGN SYSTEM
   Minimalist. Cinematic. Precise.
   ═══════════════════════════════════════════ */
:root {
  --bg: #f5f5f7;
  --bg-dark: #000;
  --surface: #fff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #6e6e73;
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --green: #34c759;
  --orange: #ff9500;
  --red: #ff3b30;
  --purple: #af52de;
  --teal: #5ac8fa;
  --border: rgba(0,0,0,.08);
  --border-strong: rgba(0,0,0,.12);
  --shadow-sm: 0 1px 4px rgba(0,0,0,.04);
  --shadow: 0 4px 20px rgba(0,0,0,.06);
  --radius-sm: 12px;
  --radius: 18px;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --duration-fast: 0.3s;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══ TOP NAV ═══ */
.topnav {
  position: relative; z-index: 100;
  background: rgba(255,255,255,.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
}
.topnav-inner {
  max-width: 100%; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; padding: 0 24px;
}
.nav-brand {
  font-size: 17px; font-weight: 600; color: var(--text);
  letter-spacing: -.2px; text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.nav-brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--blue);
}
.nav-actions { display: flex; align-items: center; gap: 12px; }

.shortcut-hint {
  font-size: 10px; color: var(--text-secondary);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
.shortcut-hint kbd {
  display: inline-block; padding: 2px 7px;
  background: var(--bg); border: 1px solid var(--border-strong);
  border-radius: 5px; font-size: 10px; color: var(--text-tertiary);
}

/* ═══ MAIN ═══ */
.main { display: flex; flex: 1; overflow: hidden; }

/* ═══ LEFT PANEL ═══ */
.left-panel {
  width: 380px; min-width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}

.drop-zone {
  margin: 16px; padding: 36px 16px;
  border: 2px dashed rgba(0,0,0,.12);
  border-radius: var(--radius); text-align: center;
  cursor: pointer; color: var(--text-secondary);
  background: var(--bg); transition: all var(--duration-fast) var(--ease-out);
  position: relative;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--blue);
  background: rgba(0,113,227,.03);
  color: var(--blue);
}
.drop-zone .icon { font-size: 36px; margin-bottom: 10px; display: block; opacity: .6; }
.drop-zone:hover .icon, .drop-zone.drag-over .icon { opacity: 1; }
.drop-zone .hint { font-size: 13px; line-height: 1.6; font-weight: 500; }
.drop-zone .hint-sub { font-size: 11px; color: var(--text-secondary); margin-top: 5px; }

.file-list {
  flex: 1; overflow-y: auto; padding: 0 16px 16px;
}
.file-list::-webkit-scrollbar { width: 5px; }
.file-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }
.file-list::-webkit-scrollbar-track { background: transparent; }
.file-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-radius: var(--radius-sm);
  margin-bottom: 6px; background: var(--bg);
  border: 1px solid var(--border);
  font-size: 12px; transition: all var(--duration-fast) var(--ease-out);
}
.file-item:hover {
  background: var(--surface);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.file-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.file-item .dot.pie { background: var(--blue); }
.file-item .dot.funnel { background: var(--orange); }
.file-item .dot.bar { background: var(--purple); }
.file-item .dot.scatter { background: #f59e0b; }
.file-item .dot.wordCloud { background: var(--green); }
.file-item .dot.radar { background: var(--red); }
.file-item .dot.treemap { background: var(--teal); }
.file-item .dot.donut { background: var(--red); }
.file-item .name {
  flex: 1; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; color: var(--text); font-weight: 500;
}
.file-item .type-tag {
  font-size: 10px; padding: 2px 12px; border-radius: 12px;
  background: rgba(0,113,227,.08); color: var(--blue);
  flex-shrink: 0; font-weight: 600; letter-spacing: .1px;
}
.file-item .remove {
  color: var(--text-secondary); cursor: pointer;
  font-size: 14px; flex-shrink: 0;
  transition: color var(--duration-fast) var(--ease-out);
  width: 22px; text-align: center; border: none; background: none;
}
.file-item .remove:hover { color: var(--red); }

.panel-actions {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}

/* ═══ BUTTONS ═══ */
.btn {
  padding: 9px 18px; border-radius: 20px; cursor: pointer;
  font-size: 13px; font-weight: 500;
  transition: all var(--duration-fast) var(--ease-out);
  font-family: inherit; letter-spacing: -.1px;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  border: none;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
.btn-primary {
  background: var(--blue); color: #fff;
  box-shadow: 0 2px 10px rgba(0,113,227,.3);
}
.btn-primary:hover { background: var(--blue-hover); box-shadow: 0 4px 18px rgba(0,113,227,.4); }
.btn-ghost {
  background: var(--surface); color: var(--text-secondary);
  border: 1px solid var(--border-strong);
}
.btn-ghost:hover { border-color: var(--text-tertiary); color: var(--text); background: var(--bg); }
.btn-danger {
  background: rgba(255,59,48,.08); color: var(--red);
}
.btn-danger:hover { background: rgba(255,59,48,.16); }

/* ═══ RIGHT PANEL ═══ */
.right-panel {
  flex: 1; display: flex; flex-direction: column;
  background: var(--surface);
}

.code-header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.terminal-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px;
}
.terminal-dots { display: flex; gap: 7px; }
.terminal-dot { width: 11px; height: 11px; border-radius: 50%; }
.terminal-dot.red { background: #ff5f56; }
.terminal-dot.yellow { background: #ffbd2e; }
.terminal-dot.green { background: #27c93f; }
.terminal-title {
  font-size: 11px; color: var(--text-secondary);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  letter-spacing: .3px;
}
.code-actions { display: flex; gap: 8px; padding-right: 14px; }
.code-actions .btn { font-size: 12px; padding: 6px 16px; }

.code-editor {
  flex: 1; background: var(--bg-dark); color: #e6edf3;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px; line-height: 1.8; padding: 18px 20px;
  border: none; outline: none; resize: none;
  tab-size: 2; letter-spacing: .2px;
}
.code-editor::-webkit-scrollbar { width: 8px; }
.code-editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
.code-editor::-webkit-scrollbar-track { background: var(--bg-dark); }
.code-editor::placeholder { color: var(--text-tertiary); }
.code-editor::selection { background: rgba(0,113,227,.3); }

.status-bar {
  padding: 8px 16px; border-top: 1px solid var(--border);
  background: var(--surface); font-size: 11px;
  color: var(--text-secondary); display: flex; gap: 20px;
  align-items: center;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
.status-bar .status-item { display: flex; align-items: center; gap: 6px; }
.status-bar .status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  display: inline-block;
}
.status-bar .status-dot.idle { background: var(--green); }
.status-bar .status-dot.running { background: var(--blue); animation: pulse 1.4s infinite; }
.status-bar .status-dot.done { background: var(--teal); }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .25; transform: scale(.6); }
}

/* ═══ PREVIEW ═══ */
.preview-section {
  border-top: 1px solid var(--border);
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height 0.4s var(--ease-out), opacity 0.3s;
  background: var(--bg);
}
.preview-section.active { max-height: 300px; opacity: 1; }
.preview-header {
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.preview-header span {
  font-size: 11px; color: var(--text-secondary);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
.preview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; padding: 12px 16px; overflow-y: auto; max-height: 248px;
}
.preview-card {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 12px; text-align: center;
  border: 1px solid var(--border);
  transition: all var(--duration-fast) var(--ease-out);
}
.preview-card:hover { border-color: var(--blue); box-shadow: var(--shadow-sm); }
.preview-card .preview-type {
  font-size: 10px; padding: 2px 12px; border-radius: 12px;
  display: inline-block; margin-bottom: 6px;
  background: rgba(0,113,227,.08); color: var(--blue); font-weight: 600;
}
.preview-card .preview-name {
  font-size: 11px; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preview-card .preview-items {
  font-size: 22px; color: var(--blue);
  font-weight: 700; margin-top: 4px;
}

/* ═══ TOAST ═══ */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 999;
  padding: 14px 24px; border-radius: 14px; font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(-10px);
  transition: all 0.3s var(--ease-out);
  backdrop-filter: blur(14px); border: 1px solid transparent;
  box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success {
  background: rgba(255,255,255,.9); color: var(--green);
  border-color: rgba(52,199,89,.2);
  border-left: 4px solid var(--green);
}
.toast.error {
  background: rgba(255,255,255,.9); color: var(--red);
  border-color: rgba(255,59,48,.2);
  border-left: 4px solid var(--red);
}
.toast.info {
  background: rgba(255,255,255,.9); color: var(--blue);
  border-color: rgba(0,113,227,.2);
  border-left: 4px solid var(--blue);
}

.empty-state {
  padding: 40px 20px; text-align: center;
  color: var(--text-secondary); font-size: 13px;
}
.empty-state .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: .4; }
.empty-state .empty-text { line-height: 1.6; }

@media(max-width:900px) {
  .main { flex-direction: column; }
  .left-panel { width: 100%; min-width: auto; max-height: 45vh; }
  .right-panel { flex: 1; }
}
</style>
</head>
<body>

<div class="topnav">
  <div class="topnav-inner">
    <a class="nav-brand" href="#">
      <span class="nav-brand-dot"></span>
      Excel &rarr; ECharts 代码生成器
    </a>
    <div class="nav-actions">
      <span class="shortcut-hint"><kbd>Ctrl</kbd> + <kbd>G</kbd> 生成</span>
    </div>
  </div>
</div>

<div class="main">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <span class="icon">&#128193;</span>
      <div class="hint">拖拽 Excel 文件到此处<br>或点击选择文件（支持多选）</div>
      <div class="hint-sub">.xlsx / .xls</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="file-list" id="fileList">
      <div class="empty-state">
        <div class="empty-icon">&#128196;</div>
        <div class="empty-text">暂无文件<br>请上传 .xlsx 文件</div>
      </div>
    </div>
    <div class="panel-actions">
      <button class="btn btn-primary" onclick="generateCode()" id="btnGenerate" style="flex:1;justify-content:center">生成代码</button>
      <button class="btn btn-ghost" onclick="clearFiles()">清空</button>
      <button class="btn btn-ghost" onclick="loadDemo()">示例</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="code-header">
      <div class="terminal-bar">
        <div class="terminal-dots"><span class="terminal-dot red"></span><span class="terminal-dot yellow"></span><span class="terminal-dot green"></span></div>
        <span class="terminal-title">chart-config.json</span>
      </div>
      <div class="code-actions">
        <button class="btn btn-primary" onclick="copyCode()" style="font-size:12px;padding:6px 16px">复制代码</button>
        <button class="btn btn-ghost" onclick="downloadCode()" style="font-size:12px;padding:6px 16px">下载 JSON</button>
      </div>
    </div>
    <textarea class="code-editor" id="codeEditor" placeholder="// 上传 Excel 文件后点击「生成代码」
// 转化后的 ECharts 配置将在这里显示...

$ waiting for input..." readonly spellcheck="false"></textarea>

    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <span>chart preview</span>
        <button class="btn btn-ghost" onclick="togglePreview()" style="font-size:11px;padding:4px 14px">收起</button>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="status-bar">
      <div class="status-item"><span class="status-dot idle" id="statusDot"></span><span id="genStatus">就绪</span></div>
      <span id="fileCount">已加载: 0 个文件</span>
      <span id="chartCount">图表数: 0</span>
      <span style="margin-left:auto">utf-8 | json</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var uploadedFiles=[],previewVisible=false;

var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files)});

function handleFiles(fl){for(var i=0;i<fl.length;i++){var f=fl[i];if(!f.name.endsWith('.xlsx')&&!f.name.endsWith('.xls'))continue;if(uploadedFiles.find(function(x){return x.name===f.name}))continue;uploadedFiles.push(f)}renderFileList()}

function renderFileList(){
  var c=document.getElementById('fileList');
  if(!uploadedFiles.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">暂无文件<br>请上传 .xlsx 文件</div></div>'}
  else{c.innerHTML=uploadedFiles.map(function(f,i){var t=detectType(f.name);return'<div class="file-item" style="animation-delay:'+(i*.04)+'s"><span class="dot '+t+'"></span><span class="name" title="'+esc(f.name)+'">'+esc(f.name)+'</span><span class="type-tag">'+typeName(t)+'</span><span class="remove" onclick="removeFile('+i+')">&#10005;</span></div>'}).join('')}
  document.getElementById('fileCount').textContent='已加载: '+uploadedFiles.length+' 个文件'
}
function removeFile(i){uploadedFiles.splice(i,1);renderFileList()}
function clearFiles(){uploadedFiles=[];renderFileList();document.getElementById('codeEditor').value='';document.getElementById('chartCount').textContent='图表数: 0';hidePreview();updateDot('idle');document.getElementById('genStatus').textContent='就绪'}
function detectType(name){var map={'饼图':'pie','漏斗图':'funnel','柱状图':'bar','气泡图':'scatter','词云':'wordCloud','雷达图':'radar','矩形树图':'treemap','环形图':'donut'};for(var k in map){if(name.includes(k))return map[k]}return'bar'}
function typeName(t){var map={pie:'饼图',funnel:'漏斗图',bar:'柱状图',scatter:'气泡图',wordCloud:'词云',radar:'雷达图',treemap:'矩形树图',donut:'环形图'};return map[t]||'未知'}

async function generateCode(){
  if(!uploadedFiles.length){showToast('请先上传 Excel 文件','error');return}
  document.getElementById('btnGenerate').disabled=true;document.getElementById('genStatus').textContent='处理中...';updateDot('running');
  var fd=new FormData();uploadedFiles.forEach(function(f){fd.append('files',f)})
  try{var r=await fetch('/api/process',{method:'POST',body:fd});var d=await r.json();
    if(d.error){showToast(d.error,'error');updateDot('idle');document.getElementById('btnGenerate').disabled=false;return}
    document.getElementById('codeEditor').value=d.code;document.getElementById('chartCount').textContent='图表数: '+d.count;
    document.getElementById('genStatus').textContent='生成完成';updateDot('done');
    if(d.config&&d.config.charts)renderPreview(d.config.charts);
    showToast('代码已生成! 共 '+d.count+' 个图表','success')
  }catch(e){showToast('处理失败: '+e.message,'error');updateDot('idle')}
  finally{document.getElementById('btnGenerate').disabled=false}
}

function renderPreview(charts){var g=document.getElementById('previewGrid');g.innerHTML=charts.map(function(c){var t=typeName(c.type),items=c.data?c.data.length:0;return'<div class="preview-card"><span class="preview-type">'+t+'</span><div class="preview-name" title="'+esc(c.title||'')+'">'+esc(c.title||'未命名')+'</div><div class="preview-items">'+items+'</div></div>'}).join('');showPreview()}
function showPreview(){previewVisible=true;document.getElementById('previewSection').classList.add('active')}
function hidePreview(){previewVisible=false;document.getElementById('previewSection').classList.remove('active')}
function togglePreview(){previewVisible?hidePreview():showPreview()}
function updateDot(s){var d=document.getElementById('statusDot');d.className='status-dot '+s}

function copyCode(){var c=document.getElementById('codeEditor').value;if(!c){showToast('没有代码可复制','error');return}navigator.clipboard.writeText(c).then(function(){showToast('代码已复制到剪贴板','success')})}
function downloadCode(){var c=document.getElementById('codeEditor').value;if(!c){showToast('没有代码可下载','error');return}var b=new Blob([c],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chart_config.json';a.click();showToast('JSON 文件已下载','success')}
function loadDemo(){showToast('请手动选择文件夹中的 Excel 文件','info');document.getElementById('fileInput').click()}

function showToast(msg,type){type=type||'info';var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;void t.offsetWidth;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='g'){e.preventDefault();generateCode()}})
</script>
</body>
</html>
