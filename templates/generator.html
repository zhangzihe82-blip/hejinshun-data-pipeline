<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel → ECharts 代码生成器</title>
<style>
:root {
  --bg: #1e1e2e; --panel: #252536; --border: #3a3a50;
  --accent: #4fc3f7; --text: #cdd6f4; --text-dim: #8899aa;
  --btn: #4fc3f7; --warn: #ff6e40;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* Header */
.header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
.header .badge { font-size: 12px; color: var(--text-dim); }

/* Main Layout */
.main {
  display: flex; flex: 1; overflow: hidden;
}

/* Left Panel - File Upload */
.left-panel {
  width: 360px; min-width: 300px; background: var(--panel);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
}

.drop-zone {
  margin: 14px; padding: 30px 14px; border: 2px dashed var(--border);
  border-radius: 8px; text-align: center; cursor: pointer; transition: .2s;
  color: var(--text-dim);
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); color: var(--accent); }
.drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
.drop-zone .hint { font-size: 13px; }

.file-list {
  flex: 1; overflow-y: auto; padding: 0 14px 14px;
}
.file-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.file-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 6px; margin-bottom: 4px; background: var(--bg);
  font-size: 12px;
}
.file-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.file-item .dot.pie { background: #4fc3f7; } .file-item .dot.funnel { background: #ff6e40; }
.file-item .dot.bar { background: #7c4dff; } .file-item .dot.scatter { background: #ffd740; }
.file-item .dot.wordCloud { background: #00e676; } .file-item .dot.radar { background: #e040fb; }
.file-item .dot.treemap { background: #40c4ff; } .file-item .dot.donut { background: #ff4081; }

.file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .type-tag {
  font-size: 10px; padding: 1px 8px; border-radius: 10px;
  background: rgba(79,195,247,.15); color: var(--accent); flex-shrink: 0;
}
.file-item .remove { color: var(--warn); cursor: pointer; font-size: 14px; flex-shrink: 0; }

.panel-actions {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.btn {
  padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: .2s;
}
.btn-primary { background: var(--accent); color: #1e1e2e; }
.btn-primary:hover { opacity: .85; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-warn { background: transparent; border: 1px solid var(--warn); color: var(--warn); }

/* Right Panel - Code */
.right-panel {
  flex: 1; display: flex; flex-direction: column; background: var(--bg);
}
.code-header {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.code-header span { font-size: 13px; color: var(--text-dim); }
.code-actions { display: flex; gap: 8px; }

.code-editor {
  flex: 1; background: #111; color: #e0e0e0; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px; line-height: 1.6; padding: 16px; border: none; outline: none;
  resize: none; tab-size: 2;
}
.code-editor::-webkit-scrollbar { width: 6px; }
.code-editor::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 3px; }

.status-bar {
  padding: 6px 14px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-dim); display: flex; gap: 14px;
}

.toast {
  position: fixed; top: 16px; right: 16px; z-index: 999;
  background: var(--accent); color: #1e1e2e; padding: 10px 20px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(-10px); transition: .25s;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>Excel → ECharts 代码生成器</h1>
  <span class="badge">将Excel数据转换为数据大屏代码</span>
</div>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📁</div>
      <div class="hint">拖拽 Excel 文件到此处<br>或点击选择（支持多选）</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="file-list" id="fileList">
      <div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px;">暂无文件<br>请上传 .xlsx 文件</div>
    </div>
    <div class="panel-actions">
      <button class="btn btn-primary" onclick="generateCode()" id="btnGenerate">生成代码</button>
      <button class="btn btn-outline" onclick="clearFiles()">清空文件</button>
      <button class="btn btn-outline" onclick="loadDemo()">加载示例</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="code-header">
      <span>生成的配置代码（复制后粘贴到数据大屏的"自定义数据"面板）</span>
      <div class="code-actions">
        <button class="btn btn-primary" onclick="copyCode()">复制代码</button>
        <button class="btn btn-outline" onclick="downloadCode()">下载 JSON</button>
      </div>
    </div>
    <textarea class="code-editor" id="codeEditor" placeholder="上传Excel文件后点击「生成代码」，转化后的ECharts配置将在这里显示..." readonly spellcheck="false"></textarea>
    <div class="status-bar">
      <span id="fileCount">已加载: 0 个文件</span>
      <span id="chartCount">图表数: 0</span>
      <span id="genStatus">就绪</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let uploadedFiles = [];

// ─── File Handling ──────────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

function handleFiles(fileList) {
  for (let f of fileList) {
    if (!f.name.endsWith('.xlsx') && !f.name.endsWith('.xls')) continue;
    if (uploadedFiles.find(x => x.name === f.name)) continue;
    uploadedFiles.push(f);
  }
  renderFileList();
}

function renderFileList() {
  const container = document.getElementById('fileList');
  if (!uploadedFiles.length) {
    container.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px;">暂无文件<br>请上传 .xlsx 文件</div>';
  } else {
    container.innerHTML = uploadedFiles.map((f, i) => {
      const type = detectType(f.name);
      return `<div class="file-item">
        <span class="dot ${type}"></span>
        <span class="name" title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="type-tag">${typeName(type)}</span>
        <span class="remove" onclick="removeFile(${i})">✕</span>
      </div>`;
    }).join('');
  }
  document.getElementById('fileCount').textContent = '已加载: ' + uploadedFiles.length + ' 个文件';
}

function removeFile(i) { uploadedFiles.splice(i, 1); renderFileList(); }
function clearFiles() { uploadedFiles = []; renderFileList(); document.getElementById('codeEditor').value = ''; }

function detectType(name) {
  const map = { '饼图':'pie','漏斗图':'funnel','柱状图':'bar','气泡图':'scatter','词云':'wordCloud','雷达图':'radar','矩形树图':'treemap','环形图':'donut' };
  for (let [k, v] of Object.entries(map)) if (name.includes(k)) return v;
  return 'bar';
}

function typeName(t) {
  const map = { pie:'饼图', funnel:'漏斗图', bar:'柱状图', scatter:'气泡图', wordCloud:'词云', radar:'雷达图', treemap:'矩形树图', donut:'环形图' };
  return map[t] || '未知';
}

// ─── Generate Code ──────────────────────────────────────
async function generateCode() {
  if (!uploadedFiles.length) { showToast('请先上传 Excel 文件'); return; }
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('genStatus').textContent = '处理中...';

  const formData = new FormData();
  uploadedFiles.forEach(f => formData.append('files', f));

  try {
    const resp = await fetch('/api/process', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.error) { showToast(data.error); return; }
    document.getElementById('codeEditor').value = data.code;
    document.getElementById('chartCount').textContent = '图表数: ' + data.count;
    document.getElementById('genStatus').textContent = '生成完成';
    showToast('代码已生成！共 ' + data.count + ' 个图表');
  } catch (e) {
    showToast('处理失败: ' + e.message);
  } finally {
    document.getElementById('btnGenerate').disabled = false;
  }
}

// ─── Actions ────────────────────────────────────────────
function copyCode() {
  const code = document.getElementById('codeEditor').value;
  if (!code) { showToast('没有代码可复制'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('代码已复制到剪贴板'));
}

function downloadCode() {
  const code = document.getElementById('codeEditor').value;
  if (!code) return;
  const blob = new Blob([code], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'chart_config.json'; a.click();
}

function loadDemo() {
  // Load the 8 漆器 Excel files
  showToast('请手动选择123文件夹中的Excel文件');
  document.getElementById('fileInput').click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'g') { e.preventDefault(); generateCode(); }
  if (e.ctrlKey && e.key === 'c' && document.activeElement !== document.getElementById('codeEditor')) {
    // Let default behavior handle copy in textarea
  }
});
</script>
</body>
</html>
