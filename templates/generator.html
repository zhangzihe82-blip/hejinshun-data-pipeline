<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel ECharts 代码生成器</title>
<style>
/* ═══ TONGYI-INSPIRED DESIGN SYSTEM ═══ */
:root {
  --bg: #f7f8fc;
  --surface: #ffffff;
  --primary: #4f6ef7;
  --primary-hover: #3b54e0;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --blue-light: #eef2ff;
  --cyan: #06b6d4;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --warn: #f59e0b;
  --red: #ef4444;
  --pink: #ec4899;
  --text: #1a1d28;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e8eaef;
  --border-light: #f0f1f5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 16px rgba(0,0,0,.06);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);height:100vh;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══ TOP NAV ═══ */
.topnav{
  position:relative;z-index:100;
  background:rgba(255,255,255,.82);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);padding:0 24px;
}
.topnav-inner{max-width:100%;margin:0 auto;display:flex;align-items:center;height:52px;gap:20px}
.topnav-brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;text-decoration:none;white-space:nowrap}
.topnav-brand .logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800}
.topnav-actions{margin-left:auto;display:flex;align-items:center;gap:10px}

/* ═══ MAIN ═══ */
.main{display:flex;flex:1;overflow:hidden}

/* ═══ LEFT PANEL ═══ */
.left-panel{
  width:380px;min-width:320px;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  animation:slideL .35s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideL{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

.drop-zone{
  margin:16px;padding:36px 16px;border:2px dashed #d1d5db;
  border-radius:var(--radius);text-align:center;cursor:pointer;
  transition:var(--transition);color:var(--text-muted);background:var(--bg);
  position:relative
}
.drop-zone::before{content:'';position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(135deg,rgba(79,110,247,.04),rgba(124,58,237,.04));opacity:0;transition:opacity .3s}
.drop-zone:hover::before,.drop-zone.drag-over::before{opacity:1}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px rgba(79,110,247,.06);background:#fff}
.drop-zone .icon{font-size:40px;margin-bottom:10px;display:block;opacity:.7}
.drop-zone:hover .icon,.drop-zone.drag-over .icon{opacity:1}
.drop-zone .hint{font-size:13px;line-height:1.6;font-weight:500}
.drop-zone .hint-sub{font-size:11px;color:var(--text-muted);margin-top:5px}

.file-list{flex:1;overflow-y:auto;padding:0 16px 16px}
.file-list::-webkit-scrollbar{width:5px}
.file-list::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.file-list::-webkit-scrollbar-track{background:transparent}
.file-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius-sm);
  margin-bottom:6px;background:var(--bg);border:1px solid var(--border-light);
  font-size:12px;transition:var(--transition);animation:fileIn .25s ease both
}
.file-item:hover{background:#fff;border-color:#d1d5db;box-shadow:var(--shadow-sm)}
@keyframes fileIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.file-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.file-item .dot.pie{background:var(--primary)}
.file-item .dot.funnel{background:var(--warn)}
.file-item .dot.bar{background:var(--purple)}
.file-item .dot.scatter{background:#f59e0b}
.file-item .dot.wordCloud{background:var(--green)}
.file-item .dot.radar{background:var(--pink)}
.file-item .dot.treemap{background:var(--cyan)}
.file-item .dot.donut{background:var(--red)}
.file-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);font-weight:500}
.file-item .type-tag{font-size:10px;padding:2px 10px;border-radius:10px;background:var(--blue-light);color:var(--primary);flex-shrink:0;font-weight:600;letter-spacing:.2px}
.file-item .remove{color:var(--text-muted);cursor:pointer;font-size:14px;flex-shrink:0;transition:var(--transition);width:22px;text-align:center;border:none;background:none}
.file-item .remove:hover{color:var(--red)}

.panel-actions{padding:12px 16px;border-top:1px solid var(--border-light);display:flex;gap:8px}

/* ═══ BUTTONS ═══ */
.btn{
  padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;
  transition:var(--transition);font-family:inherit;letter-spacing:-.1px;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-primary{background:linear-gradient(135deg,var(--primary),#5b7ff7);color:#fff;border:none;box-shadow:0 2px 8px rgba(79,110,247,.25)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(79,110,247,.35);transform:translateY(-1px)}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text-secondary)}
.btn-ghost:hover{border-color:#c4c8d4;color:var(--text);background:var(--bg)}
.btn-warn{background:#fff;border:1px solid #fecaca;color:var(--red)}
.btn-warn:hover{background:var(--red-bg);border-color:var(--red)}

/* ═══ RIGHT PANEL ═══ */
.right-panel{flex:1;display:flex;flex-direction:column;background:var(--surface);animation:slideR .35s cubic-bezier(.4,0,.2,1) both;animation-delay:.08s}
@keyframes slideR{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.code-header{padding:0;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:space-between}
.terminal-bar{display:flex;align-items:center;gap:8px;padding:8px 16px}
.terminal-dots{display:flex;gap:7px}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-dot.red{background:#ff5f56}.terminal-dot.yellow{background:#ffbd2e}.terminal-dot.green{background:#27c93f}
.terminal-title{font-size:11px;color:var(--text-muted);font-family:'Cascadia Code','Fira Code','Consolas',monospace;letter-spacing:.3px}
.code-actions{display:flex;gap:8px;padding-right:14px}
.code-actions .btn{font-size:12px;padding:6px 14px}

.code-editor{
  flex:1;background:#1a1d28;color:#e6edf3;
  font-family:'Cascadia Code','Fira Code','Consolas','Monaco',monospace;
  font-size:13px;line-height:1.8;padding:18px 20px;border:none;outline:none;resize:none;
  tab-size:2;letter-spacing:.2px;
}
.code-editor::-webkit-scrollbar{width:8px}
.code-editor::-webkit-scrollbar-thumb{background:#2d3140;border-radius:4px}
.code-editor::-webkit-scrollbar-track{background:#1a1d28}
.code-editor::placeholder{color:#4b5563}
.code-editor::selection{background:rgba(79,110,247,.25)}

.status-bar{
  padding:8px 16px;border-top:1px solid var(--border);
  background:#fff;font-size:11px;color:var(--text-muted);
  display:flex;gap:20px;align-items:center;
  font-family:'Cascadia Code','Fira Code','Consolas',monospace;
}
.status-bar .status-item{display:flex;align-items:center;gap:6px}
.status-bar .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-bar .status-dot.idle{background:var(--green)}
.status-bar .status-dot.running{background:var(--primary);animation:pulse 1.2s infinite}
.status-bar .status-dot.done{background:var(--cyan)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* ═══ PREVIEW ═══ */
.preview-section{border-top:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;background:var(--bg)}
.preview-section.active{max-height:300px;opacity:1}
.preview-header{padding:10px 16px;background:#fff;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.preview-header span{font-size:11px;color:var(--text-muted);font-family:'Cascadia Code','Fira Code','Consolas',monospace}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:12px 16px;overflow-y:auto;max-height:248px}
.preview-card{
  background:var(--surface);border:1px solid var(--border-light);
  border-radius:var(--radius-sm);padding:12px;text-align:center;
  transition:var(--transition);cursor:default
}
.preview-card:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.preview-card .preview-type{font-size:10px;padding:2px 10px;border-radius:10px;display:inline-block;margin-bottom:6px;background:var(--blue-light);color:var(--primary);font-weight:600}
.preview-card .preview-name{font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-card .preview-items{font-size:22px;color:var(--primary);font-weight:700;margin-top:4px}

/* ═══ TOAST ═══ */
.toast{
  position:fixed;top:20px;right:20px;z-index:999;
  padding:12px 22px;border-radius:var(--radius);font-size:13px;font-weight:500;
  opacity:0;transform:translateY(-10px);transition:all .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(14px);border:1px solid transparent;
  box-shadow:var(--shadow);
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#fff;color:#059669;border-color:#a7f3d0;border-left:4px solid var(--green)}
.toast.error{background:#fff;color:var(--red);border-color:#fecaca;border-left:4px solid var(--red)}
.toast.info{background:#fff;color:var(--primary);border-color:rgba(79,110,247,.2);border-left:4px solid var(--primary)}

/* ═══ SHORTCUT ═══ */
.shortcut-hint{font-size:10px;color:var(--text-muted);margin-left:auto;padding-right:14px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;white-space:nowrap}
.shortcut-hint kbd{display:inline-block;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text-secondary)}

.empty-state{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px}
.empty-state .empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.empty-state .empty-text{line-height:1.6}

@media(max-width:900px){.main{flex-direction:column}.left-panel{width:100%;min-width:auto;max-height:45vh}.right-panel{flex:1}}
</style>
</head>
<body>

<div class="topnav">
  <div class="topnav-inner">
    <a class="topnav-brand" href="#">
      <div class="logo">&#10095;</div>
      Excel &rarr; ECharts 代码生成器
    </a>
    <div class="topnav-actions">
      <span class="shortcut-hint"><kbd>Ctrl</kbd> + <kbd>G</kbd> 生成</span>
    </div>
  </div>
</div>

<div class="main">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <span class="icon">&#128193;</span>
      <div class="hint">拖拽 Excel 文件到此处<br>或点击选择文件（支持多选）</div>
      <div class="hint-sub">.xlsx / .xls</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="file-list" id="fileList">
      <div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">暂无文件<br>请上传 .xlsx 文件</div></div>
    </div>
    <div class="panel-actions">
      <button class="btn btn-primary" onclick="generateCode()" id="btnGenerate" style="flex:1;justify-content:center">生成代码</button>
      <button class="btn btn-ghost" onclick="clearFiles()">清空</button>
      <button class="btn btn-ghost" onclick="loadDemo()">示例</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="code-header">
      <div class="terminal-bar">
        <div class="terminal-dots"><span class="terminal-dot red"></span><span class="terminal-dot yellow"></span><span class="terminal-dot green"></span></div>
        <span class="terminal-title">chart-config.json</span>
      </div>
      <div class="code-actions">
        <button class="btn btn-primary" onclick="copyCode()" style="font-size:12px;padding:6px 14px">复制代码</button>
        <button class="btn btn-ghost" onclick="downloadCode()" style="font-size:12px;padding:6px 14px">下载 JSON</button>
      </div>
    </div>
    <textarea class="code-editor" id="codeEditor" placeholder="// 上传 Excel 文件后点击「生成代码」
// 转化后的 ECharts 配置将在这里显示...

$ waiting for input..." readonly spellcheck="false"></textarea>

    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <span>chart preview</span>
        <button class="btn btn-ghost" onclick="togglePreview()" style="font-size:11px;padding:4px 12px">收起</button>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="status-bar">
      <div class="status-item"><span class="status-dot idle" id="statusDot"></span><span id="genStatus">就绪</span></div>
      <span id="fileCount">已加载: 0 个文件</span>
      <span id="chartCount">图表数: 0</span>
      <span style="margin-left:auto">utf-8 | json</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var uploadedFiles=[],previewVisible=false;

// FILE HANDLING
var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files)});

function handleFiles(fl){for(var i=0;i<fl.length;i++){var f=fl[i];if(!f.name.endsWith('.xlsx')&&!f.name.endsWith('.xls'))continue;if(uploadedFiles.find(function(x){return x.name===f.name}))continue;uploadedFiles.push(f)}renderFileList()}

function renderFileList(){
  var c=document.getElementById('fileList');
  if(!uploadedFiles.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">暂无文件<br>请上传 .xlsx 文件</div></div>'}
  else{c.innerHTML=uploadedFiles.map(function(f,i){var t=detectType(f.name);return'<div class="file-item" style="animation-delay:'+(i*.04)+'s"><span class="dot '+t+'"></span><span class="name" title="'+esc(f.name)+'">'+esc(f.name)+'</span><span class="type-tag">'+typeName(t)+'</span><span class="remove" onclick="removeFile('+i+')">✕</span></div>'}).join('')}
  document.getElementById('fileCount').textContent='已加载: '+uploadedFiles.length+' 个文件'
}
function removeFile(i){uploadedFiles.splice(i,1);renderFileList()}
function clearFiles(){uploadedFiles=[];renderFileList();document.getElementById('codeEditor').value='';document.getElementById('chartCount').textContent='图表数: 0';hidePreview();updateDot('idle');document.getElementById('genStatus').textContent='就绪'}
function detectType(name){var map={'饼图':'pie','漏斗图':'funnel','柱状图':'bar','气泡图':'scatter','词云':'wordCloud','雷达图':'radar','矩形树图':'treemap','环形图':'donut'};for(var k in map){if(name.includes(k))return map[k]}return'bar'}
function typeName(t){var map={pie:'饼图',funnel:'漏斗图',bar:'柱状图',scatter:'气泡图',wordCloud:'词云',radar:'雷达图',treemap:'矩形树图',donut:'环形图'};return map[t]||'未知'}

// GENERATE
async function generateCode(){
  if(!uploadedFiles.length){showToast('请先上传 Excel 文件','error');return}
  document.getElementById('btnGenerate').disabled=true;document.getElementById('genStatus').textContent='处理中...';updateDot('running');
  var fd=new FormData();uploadedFiles.forEach(function(f){fd.append('files',f)})
  try{var r=await fetch('/api/process',{method:'POST',body:fd});var d=await r.json();
    if(d.error){showToast(d.error,'error');updateDot('idle');document.getElementById('btnGenerate').disabled=false;return}
    document.getElementById('codeEditor').value=d.code;document.getElementById('chartCount').textContent='图表数: '+d.count;
    document.getElementById('genStatus').textContent='生成完成';updateDot('done');
    if(d.config&&d.config.charts)renderPreview(d.config.charts);
    showToast('代码已生成! 共 '+d.count+' 个图表','success')
  }catch(e){showToast('处理失败: '+e.message,'error');updateDot('idle')}
  finally{document.getElementById('btnGenerate').disabled=false}
}

// PREVIEW
function renderPreview(charts){var g=document.getElementById('previewGrid');g.innerHTML=charts.map(function(c){var t=typeName(c.type),items=c.data?c.data.length:0;return'<div class="preview-card"><span class="preview-type">'+t+'</span><div class="preview-name" title="'+esc(c.title||'')+'">'+esc(c.title||'未命名')+'</div><div class="preview-items">'+items+'</div></div>'}).join('');showPreview()}
function showPreview(){previewVisible=true;document.getElementById('previewSection').classList.add('active')}
function hidePreview(){previewVisible=false;document.getElementById('previewSection').classList.remove('active')}
function togglePreview(){previewVisible?hidePreview():showPreview()}
function updateDot(s){var d=document.getElementById('statusDot');d.className='status-dot '+s}

// ACTIONS
function copyCode(){var c=document.getElementById('codeEditor').value;if(!c){showToast('没有代码可复制','error');return}navigator.clipboard.writeText(c).then(function(){showToast('代码已复制到剪贴板','success')})}
function downloadCode(){var c=document.getElementById('codeEditor').value;if(!c){showToast('没有代码可下载','error');return}var b=new Blob([c],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chart_config.json';a.click();showToast('JSON 文件已下载','success')}
function loadDemo(){showToast('请手动选择文件夹中的 Excel 文件','info');document.getElementById('fileInput').click()}

// TOAST
function showToast(msg,type){type=type||'info';var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;void t.offsetWidth;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// KEYBOARD
document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='g'){e.preventDefault();generateCode()}})
</script>
</body>
</html>
