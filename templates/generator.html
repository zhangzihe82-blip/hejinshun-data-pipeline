<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel ECharts 代码生成器</title>
<style>
/* ═══ CYBER-TECH GLASSMORPHISM DESIGN SYSTEM ═══ */
:root {
  --bg-deep:#060b1a;
  --bg-panel:rgba(10,18,40,.78);
  --bg-panel-hover:rgba(14,24,52,.88);
  --border-glow:rgba(0,180,255,.18);
  --border-hover:rgba(0,200,255,.45);
  --accent:#00b8ff;
  --accent2:#00d4ff;
  --cyan:#00e5ff;
  --purple:#885ef0;
  --purple2:#a878ff;
  --warn:#ff6b3d;
  --warn2:#ff8c66;
  --green:#00e676;
  --green2:#5cff7e;
  --gold:#ffd740;
  --pink:#ff4081;
  --text:#e0e6f0;
  --text-dim:#6a7d9e;
  --glass-blur:14px;
  --radius:10px;
  --shadow-glow:0 0 24px rgba(0,180,255,.12);
  --tf:0.2s cubic-bezier(0.4,0,0.2,1);
  --ts:0.35s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  background:var(--bg-deep);color:var(--text);height:100vh;
  display:flex;flex-direction:column;overflow:hidden;
}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    linear-gradient(rgba(0,180,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,.03) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 40%,black 30%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 40%,black 30%,transparent 70%);
}
.scan-line{position:fixed;inset:0;pointer-events:none;z-index:2;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,180,255,.008) 2px,rgba(0,180,255,.008) 4px)}

/* HEADER */
.header{
  position:relative;z-index:10;text-align:center;padding:18px 0 10px;
  background:linear-gradient(180deg,rgba(8,16,36,.96) 30%,rgba(8,16,36,.4) 80%,transparent 100%);
  border-bottom:1px solid var(--border-glow);
}
.header h1{
  font-size:26px;font-weight:800;letter-spacing:6px;
  background:linear-gradient(135deg,var(--cyan) 0%,var(--accent) 30%,var(--purple2) 60%,var(--pink) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradientFlow 4s ease infinite;
}
@keyframes gradientFlow{0%,100%{background-position:0% center}50%{background-position:100% center}}
.header .subtitle{font-size:11px;color:var(--text-dim);margin-top:3px;letter-spacing:2px;font-weight:300}

/* MAIN */
.main{position:relative;z-index:10;display:flex;flex:1;overflow:hidden}

/* LEFT PANEL */
.left-panel{
  width:380px;min-width:320px;background:var(--bg-panel);
  border-right:1px solid var(--border-glow);display:flex;flex-direction:column;
  backdrop-filter:blur(var(--glass-blur));animation:slideL .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideL{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

.drop-zone{
  margin:16px;padding:38px 16px;border:2px dashed rgba(0,180,255,.22);
  border-radius:var(--radius);text-align:center;cursor:pointer;
  transition:var(--ts);color:var(--text-dim);background:rgba(0,0,0,.18);
  position:relative;overflow:hidden;
}
.drop-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(0,180,255,.04) 0%,transparent 70%);opacity:0;transition:opacity .3s}
.drop-zone:hover::before,.drop-zone.drag-over::before{opacity:1}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);color:var(--accent);box-shadow:0 0 24px rgba(0,180,255,.12);background:rgba(0,0,0,.3)}
.drop-zone .icon{font-size:42px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 8px rgba(0,180,255,.2))}
.drop-zone .hint{font-size:13px;line-height:1.6}
.drop-zone .hint-sub{font-size:10px;color:var(--text-dim);margin-top:6px;opacity:.5}

.file-list{flex:1;overflow-y:auto;padding:0 16px 16px}
.file-list::-webkit-scrollbar{width:5px}
.file-list::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--accent),var(--purple));border-radius:3px}
.file-list::-webkit-scrollbar-track{background:transparent}
.file-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;
  margin-bottom:6px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.03);
  font-size:12px;transition:var(--tf);animation:fileIn .25s cubic-bezier(.4,0,.2,1) both;
}
.file-item:hover{background:rgba(0,180,255,.08);border-color:var(--border-glow)}
@keyframes fileIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.file-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.file-item .dot.pie{background:#00b8ff;color:#00b8ff}
.file-item .dot.funnel{background:#ff6b3d;color:#ff6b3d}
.file-item .dot.bar{background:#885ef0;color:#885ef0}
.file-item .dot.scatter{background:#ffd740;color:#ffd740}
.file-item .dot.wordCloud{background:#00e676;color:#00e676}
.file-item .dot.radar{background:#e040fb;color:#e040fb}
.file-item .dot.treemap{background:#00e5ff;color:#00e5ff}
.file-item .dot.donut{background:#ff4081;color:#ff4081}
.file-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-item .type-tag{font-size:10px;padding:2px 10px;border-radius:10px;background:rgba(0,180,255,.12);color:var(--accent);flex-shrink:0;letter-spacing:.5px;border:1px solid rgba(0,180,255,.15)}
.file-item .remove{color:var(--text-dim);cursor:pointer;font-size:14px;flex-shrink:0;transition:var(--tf);width:22px;text-align:center}
.file-item .remove:hover{color:var(--warn)}

.panel-actions{padding:12px 16px;border-top:1px solid var(--border-glow);display:flex;gap:8px}

/* BUTTONS */
.btn{
  padding:9px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;
  transition:all .25s ease;position:relative;overflow:hidden;letter-spacing:.5px;
  backdrop-filter:blur(6px);
}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s}
.btn:active::after{width:300px;height:300px}
.btn-primary{background:linear-gradient(135deg,rgba(0,180,255,.2),rgba(0,200,255,.1));border:1px solid rgba(0,180,255,.4);color:var(--accent2)}
.btn-primary:hover{background:linear-gradient(135deg,var(--accent),#0088dd);color:#fff;border-color:var(--accent);box-shadow:0 0 20px rgba(0,180,255,.25)}
.btn-ghost{background:transparent;border:1px solid var(--border-glow);color:var(--text-dim)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,180,255,.06)}
.btn-warn{background:transparent;border:1px solid var(--warn);color:var(--warn)}
.btn-warn:hover{background:var(--warn);color:#fff;box-shadow:0 0 16px rgba(255,107,61,.3)}

/* RIGHT PANEL */
.right-panel{flex:1;display:flex;flex-direction:column;background:var(--bg-deep);animation:slideR .4s cubic-bezier(.4,0,.2,1) both;animation-delay:.1s}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.code-header{padding:0;border-bottom:1px solid rgba(48,54,61,.8);background:#0e1525;display:flex;align-items:center;justify-content:space-between}
.terminal-bar{display:flex;align-items:center;gap:8px;padding:10px 14px}
.terminal-dots{display:flex;gap:7px}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-dot.red{background:#ff5f56;box-shadow:0 0 4px rgba(255,95,86,.4)}
.terminal-dot.yellow{background:#ffbd2e;box-shadow:0 0 4px rgba(255,189,46,.4)}
.terminal-dot.green{background:#27c93f;box-shadow:0 0 4px rgba(39,201,63,.4)}
.terminal-title{font-size:11px;color:#586070;font-family:'Cascadia Code','Fira Code','Consolas',monospace;letter-spacing:.5px}
.code-actions{display:flex;gap:8px;padding-right:14px}
.code-actions .btn{font-size:12px;padding:6px 14px}

.code-editor{
  flex:1;background:#090e18;color:#e6edf3;
  font-family:'Cascadia Code','Fira Code','Consolas','Monaco',monospace;
  font-size:13px;line-height:1.8;padding:18px 20px;border:none;outline:none;resize:none;
  tab-size:2;letter-spacing:.3px;
}
.code-editor::-webkit-scrollbar{width:8px}
.code-editor::-webkit-scrollbar-thumb{background:#1a2540;border-radius:4px}
.code-editor::-webkit-scrollbar-track{background:#090e18}
.code-editor::placeholder{color:#384860}
.code-editor::selection{background:rgba(0,180,255,.2)}

.status-bar{
  padding:9px 16px;border-top:1px solid rgba(48,54,61,.8);
  background:#0e1525;font-size:11px;color:#586070;
  display:flex;gap:20px;align-items:center;
  font-family:'Cascadia Code','Fira Code','Consolas',monospace;
}
.status-bar .status-item{display:flex;align-items:center;gap:6px}
.status-bar .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-bar .status-dot.idle{background:var(--green);box-shadow:0 0 6px rgba(0,230,118,.5)}
.status-bar .status-dot.running{background:var(--accent);animation:pulse 1.2s infinite;box-shadow:0 0 8px rgba(0,180,255,.5)}
.status-bar .status-dot.done{background:var(--cyan);box-shadow:0 0 8px rgba(0,229,255,.5)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

/* PREVIEW */
.preview-section{border-top:1px solid rgba(48,54,61,.8);max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;background:#090e18}
.preview-section.active{max-height:300px;opacity:1}
.preview-header{padding:10px 16px;background:#0e1525;border-bottom:1px solid rgba(48,54,61,.8);display:flex;align-items:center;justify-content:space-between}
.preview-header span{font-size:11px;color:#586070;font-family:'Cascadia Code','Fira Code','Consolas',monospace}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:12px 16px;overflow-y:auto;max-height:248px}
.preview-grid::-webkit-scrollbar{width:4px}
.preview-grid::-webkit-scrollbar-thumb{background:#1a2540;border-radius:2px}
.preview-card{
  background:rgba(10,18,40,.85);border:1px solid var(--border-glow);
  border-radius:8px;padding:12px;text-align:center;transition:var(--tf);cursor:default;
}
.preview-card:hover{border-color:var(--accent);box-shadow:0 0 14px rgba(0,180,255,.1)}
.preview-card .preview-type{font-size:10px;padding:2px 10px;border-radius:10px;display:inline-block;margin-bottom:6px;background:rgba(0,180,255,.12);color:var(--accent);border:1px solid rgba(0,180,255,.15)}
.preview-card .preview-name{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-card .preview-items{font-size:20px;color:var(--cyan);font-weight:600;margin-top:4px}

/* TOAST */
.toast{
  position:fixed;top:20px;right:20px;z-index:999;
  padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;
  opacity:0;transform:translateY(-12px);transition:all .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(14px);border:1px solid transparent;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:rgba(0,230,118,.12);color:var(--green);border-color:rgba(0,230,118,.3);box-shadow:0 4px 24px rgba(0,230,118,.18)}
.toast.error{background:rgba(255,107,61,.12);color:var(--warn);border-color:rgba(255,107,61,.3);box-shadow:0 4px 24px rgba(255,107,61,.18)}
.toast.info{background:rgba(0,180,255,.12);color:var(--accent);border-color:rgba(0,180,255,.3);box-shadow:0 4px 24px rgba(0,180,255,.18)}

/* SHORTCUT */
.shortcut-hint{font-size:10px;color:#384860;margin-left:auto;padding-right:14px;font-family:'Cascadia Code','Fira Code','Consolas',monospace}
.shortcut-hint kbd{display:inline-block;padding:2px 6px;background:#1a2540;border:1px solid rgba(255,255,255,.08);border-radius:4px;font-size:10px;color:#586070}

.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px}
.empty-state .empty-icon{font-size:34px;margin-bottom:10px;opacity:.35;filter:grayscale(1)}
.empty-state .empty-text{line-height:1.6}

@media(max-width:900px){.main{flex-direction:column}.left-panel{width:100%;min-width:auto;max-height:45vh}.right-panel{flex:1}.header h1{font-size:18px;letter-spacing:2px}}

body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at center,rgba(0,180,255,.06) 0%,transparent 70%);animation:glowPulse .6s cubic-bezier(.4,0,.2,1) forwards}
@keyframes glowPulse{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="scan-line"></div>

<div class="header">
  <h1>Excel  ECharts  代码生成器</h1>
  <div class="subtitle">EXCEL TO ECHARTS CONFIG GENERATOR</div>
</div>

<div class="main">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <span class="icon">&#128193;</span>
      <div class="hint">拖拽 Excel 文件到此处<br>或点击选择文件（支持多选）</div>
      <div class="hint-sub">.xlsx / .xls</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="file-list" id="fileList">
      <div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">暂无文件<br>请上传 .xlsx 文件</div></div>
    </div>
    <div class="panel-actions">
      <button class="btn btn-primary" onclick="generateCode()" id="btnGenerate">生成代码</button>
      <button class="btn btn-ghost" onclick="clearFiles()">清空</button>
      <button class="btn btn-ghost" onclick="loadDemo()">加载示例</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="code-header">
      <div class="terminal-bar">
        <div class="terminal-dots"><span class="terminal-dot red"></span><span class="terminal-dot yellow"></span><span class="terminal-dot green"></span></div>
        <span class="terminal-title">chart-config.json</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="code-actions">
          <button class="btn btn-primary" onclick="copyCode()" style="font-size:12px;padding:6px 14px">复制代码</button>
          <button class="btn btn-ghost" onclick="downloadCode()" style="font-size:12px;padding:6px 14px">下载 JSON</button>
        </div>
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>G</kbd> 生成</span>
      </div>
    </div>
    <textarea class="code-editor" id="codeEditor" placeholder="// 上传 Excel 文件后点击「生成代码」&#10;// 转化后的 ECharts 配置将在这里显示...&#10;&#10;$ waiting for input..." readonly spellcheck="false"></textarea>

    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <span>chart preview</span>
        <button class="btn btn-ghost" onclick="togglePreview()" style="font-size:11px;padding:4px 12px">收起</button>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="status-bar">
      <div class="status-item"><span class="status-dot idle" id="statusDot"></span><span id="genStatus">就绪</span></div>
      <span id="fileCount">已加载: 0 个文件</span>
      <span id="chartCount">图表数: 0</span>
      <span style="margin-left:auto;color:#253045">utf-8 | json</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ STARFIELD ═══
(function(){var c=document.getElementById('starfield'),ctx=c.getContext('2d'),stars=[];function rz(){c.width=window.innerWidth;c.height=window.innerHeight}rz();window.addEventListener('resize',rz);for(var i=0;i<100;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+.3,a:Math.random(),s:Math.random()*.01+.002,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25});function dr(){ctx.clearRect(0,0,c.width,c.height);for(var i=0;i<stars.length;i++){var s=stars[i];s.a+=s.s;var alpha=.35+Math.sin(s.a)*.3;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(0,200,255,'+alpha+')';ctx.fill();s.x+=s.dx;s.y+=s.dy;if(s.x<0)s.x=c.width;if(s.x>c.width)s.x=0;if(s.y<0)s.y=c.height;if(s.y>c.height)s.y=0}requestAnimationFrame(dr)}dr()})();

var uploadedFiles=[],previewVisible=false;

// FILE HANDLING
var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files)});

function handleFiles(fl){for(var i=0;i<fl.length;i++){var f=fl[i];if(!f.name.endsWith('.xlsx')&&!f.name.endsWith('.xls'))continue;if(uploadedFiles.find(function(x){return x.name===f.name}))continue;uploadedFiles.push(f)}renderFileList()}

function renderFileList(){
  var c=document.getElementById('fileList');
  if(!uploadedFiles.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-text">暂无文件<br>请上传 .xlsx 文件</div></div>'}
  else{c.innerHTML=uploadedFiles.map(function(f,i){var t=detectType(f.name);return'<div class="file-item" style="animation-delay:'+(i*.04)+'s"><span class="dot '+t+'"></span><span class="name" title="'+esc(f.name)+'">'+esc(f.name)+'</span><span class="type-tag">'+typeName(t)+'</span><span class="remove" onclick="removeFile('+i+')">✕</span></div>'}).join('')}
  document.getElementById('fileCount').textContent='已加载: '+uploadedFiles.length+' 个文件'
}
function removeFile(i){uploadedFiles.splice(i,1);renderFileList()}
function clearFiles(){uploadedFiles=[];renderFileList();document.getElementById('codeEditor').value='';document.getElementById('chartCount').textContent='图表数: 0';hidePreview();updateDot('idle');document.getElementById('genStatus').textContent='就绪'}
function detectType(name){var map={'饼图':'pie','漏斗图':'funnel','柱状图':'bar','气泡图':'scatter','词云':'wordCloud','雷达图':'radar','矩形树图':'treemap','环形图':'donut'};for(var k in map){if(name.includes(k))return map[k]}return'bar'}
function typeName(t){var map={pie:'饼图',funnel:'漏斗图',bar:'柱状图',scatter:'气泡图',wordCloud:'词云',radar:'雷达图',treemap:'矩形树图',donut:'环形图'};return map[t]||'未知'}

// GENERATE
async function generateCode(){
  if(!uploadedFiles.length){showToast('请先上传 Excel 文件','error');return}
  document.getElementById('btnGenerate').disabled=true;document.getElementById('genStatus').textContent='处理中...';updateDot('running');
  var fd=new FormData();uploadedFiles.forEach(function(f){fd.append('files',f)})
  try{var r=await fetch('/api/process',{method:'POST',body:fd});var d=await r.json();
    if(d.error){showToast(d.error,'error');updateDot('idle');document.getElementById('btnGenerate').disabled=false;return}
    document.getElementById('codeEditor').value=d.code;document.getElementById('chartCount').textContent='图表数: '+d.count;
    document.getElementById('genStatus').textContent='生成完成';updateDot('done');
    if(d.config&&d.config.charts)renderPreview(d.config.charts);
    showToast('代码已生成! 共 '+d.count+' 个图表','success')
  }catch(e){showToast('处理失败: '+e.message,'error');updateDot('idle')}
  finally{document.getElementById('btnGenerate').disabled=false}
}

// PREVIEW
function renderPreview(charts){var g=document.getElementById('previewGrid');g.innerHTML=charts.map(function(c){var t=typeName(c.type),items=c.data?c.data.length:0;return'<div class="preview-card"><span class="preview-type">'+t+'</span><div class="preview-name" title="'+esc(c.title||'')+'">'+esc(c.title||'未命名')+'</div><div class="preview-items">'+items+'</div></div>'}).join('');showPreview()}
function showPreview(){previewVisible=true;document.getElementById('previewSection').classList.add('active')}
function hidePreview(){previewVisible=false;document.getElementById('previewSection').classList.remove('active')}
function togglePreview(){previewVisible?hidePreview():showPreview()}
function updateDot(s){var d=document.getElementById('statusDot');d.className='status-dot '+s}

// ACTIONS
function copyCode(){var c=document.getElementById('codeEditor').value;if(!c){showToast('没有代码可复制','error');return}navigator.clipboard.writeText(c).then(function(){showToast('代码已复制到剪贴板','success')})}
function downloadCode(){var c=document.getElementById('codeEditor').value;if(!c){showToast('没有代码可下载','error');return}var b=new Blob([c],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chart_config.json';a.click();showToast('JSON 文件已下载','success')}
function loadDemo(){showToast('请手动选择文件夹中的 Excel 文件','info');document.getElementById('fileInput').click()}

// TOAST
function showToast(msg,type){type=type||'info';var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;void t.offsetWidth;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// KEYBOARD
document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='g'){e.preventDefault();generateCode()}})
